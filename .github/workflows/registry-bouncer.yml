name: Security Checks

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# WE NEED THIS: Give the action permission to push code back to the repo
permissions:
  contents: write

jobs:
  scan-lockfile:
    name: Scan Lockfile Registries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Registry Bouncer
        run: node scripts/scan-registry.js

      # NEW: This step ONLY runs if the previous step failed (malware found)
      - name: Publish Alert to GitHub Pages
        if: failure() 
        run: |
          echo "Malware detected! Committing the report to the blog..."
          
          # Setup a bot user to make the commit
          git config --global user.name "Registry Bouncer Bot"
          git config --global user.email "actions@github.com"
          
          # Add the new blog post file
          git add _posts/
          
          # Commit and push
          git commit -m "🚨 Security Advisory: Automated malware report added"
          git push
